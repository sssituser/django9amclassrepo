<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Page Title</title>
   <!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<!-- Bootstrap 4 CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css">

<!-- MDBootstrap 4 CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdbootstrap/4.20.0/css/mdb.min.css">
</head>
<body>
    <div class="container mt-5">
        {%if EmpList%}
        <table class="table table-bordered table-striped table-hover text-center animated zoomIn">
            <thead class="bg-secondary text-white">
                <tr>
                    <th>Employee ID</th>
                    <th>Employee Name</th>
                    <th>Employee Salary</th>
                </tr>
            </thead>
            <tbody>
                {%for emp in EmpList%}
                    <tr>
                        <td>{{emp.EmpId}}</td>
                        <td>{{emp.EmpName}}</td>
                        <td>{{emp.EmpSal}}</td>
                    </tr>
                {%endfor%}
            </tbody>
        </table>
        {%else%}
            <p class="h1 text-center text-danger">Records not found</p>
        {%endif%}
    </div>    
</body>
</html>
