<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>HomePage</title>
    <!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

<!-- Bootstrap 4 CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.2/css/bootstrap.min.css">

<!-- MDBootstrap 4 CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mdbootstrap/4.20.0/css/mdb.min.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row d-flex justify-content-center">
            <div class="col-md-10">
                {%if StuList%}
                    <table class="table table-bordered table-striped table-hover text-center">
                            <thead class="bg-primary text-white text-center">
                                <tr>
                                    <th>StudentId</th>
                                    <th>StudentName</th>
                                    <th>StudentMarks</th>
                                    <th>StudentImage</th>
                                </tr>
                            </thead>
                            <tbody>
                                {%for stu in StuList%}
                                <tr>
                                    <td>{{stu.StuId}}</td>
                                    <td>{{stu.StuName}}</td>
                                    <td>{{stu.StuMarks}}</td>
                                    <td>
                                        <img src="{{stu.StuImg}}" class="img-fluid img-thumbnail" height="150" width="150" alt="">
                                    </td>
                                </tr>
                                {%endfor%}
                            </tbody>
                    </table>
                {%else%}
                    <p class="h1 text-danger text-center">
                        Records Not found
                    </p>
                {%endif%}
            </div>
        </div>
    </div>
</body>
</html>
