{%extends 'myapp/base.html'%}
{%block body_block%}

<div class="container">
    <p class="h1 text-center text-secondary">Find Page</p>
    <div class="container">
        <div class="row d-flex justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center bg-primary text-white">
                        <p class="h3">Employee Information</p>
                    </div>
                    <div class="card-body">
                        <p class="h3">Employee ID    : {{emp.EmpId}}</p>
                        <p class="h3">Employee Name  : {{emp.EmpName}}</p>
                        <p class="h3">Employee Salary: {{emp.EmpSal}}</p>
                    </div>
                    <div class="card-footer">
                        <a href="/" class="btn btn-sm btn-outline-deep-orange">Home</a>
                        <a href="/employees" class="btn btn-sm btn-outline-dark-green float-right">Back</a>    
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{%endblock%}
